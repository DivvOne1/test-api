openapi: 3.0.3
info:
  title: Notification Service API
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
paths:
  /notifications/bulk:
    post:
      summary: Start a bulk notification campaign
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, priority, message, recipient_ids]
              properties:
                channel:
                  type: string
                  enum: [sms, email]
                priority:
                  type: string
                  enum: [transactional, marketing]
                message:
                  type: string
                idempotency_key:
                  type: string
                recipient_ids:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          description: Campaign accepted
        '409':
          description: Idempotency key conflicts with different payload
  /subscribers/notifications:
    get:
      summary: Get paginated notification history for the current subscriber
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Notification history
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
