services:
  app:
    build:
      context: .
    container_name: notification-app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.example
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
    container_name: notification-worker
    command: ["sh", "docker/worker-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.example

  tests:
    build:
      context: .
    container_name: notification-tests
    command: ["sh", "-lc", "php artisan test"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.example
    profiles:
      - tests

  db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notification-rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 20
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
